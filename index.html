<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium 3D Calculator Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
135deg,
#0f172a,
#111827,
#1e293b
);
overflow:hidden;
}

/* Animated Background */

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:#00d4ff;
filter:blur(250px);
opacity:.15;
animation:float 8s ease-in-out infinite;
}

body::after{
content:"";
position:absolute;
width:500px;
height:500px;
background:#ff00cc;
filter:blur(250px);
opacity:.12;
right:-150px;
bottom:-150px;
animation:float 10s ease-in-out infinite;
}

@keyframes float{
50%{
transform:translateY(-30px);
}
}

/* Calculator */

.calculator{
width:430px;
padding:25px;
border-radius:35px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,.12);

box-shadow:
20px 20px 60px rgba(0,0,0,.5),
-10px -10px 40px rgba(255,255,255,.03);

position:relative;
z-index:10;
}

/* Display */

.display{
width:100%;
height:110px;
border:none;
outline:none;
border-radius:25px;
padding:20px;
font-size:2.3rem;
text-align:right;
color:white;

background:
rgba(255,255,255,.05);

box-shadow:
inset 10px 10px 20px rgba(0,0,0,.4),
inset -5px -5px 15px rgba(255,255,255,.03);
}

/* History */

.history{
height:70px;
overflow-y:auto;
color:#b5c3d1;
font-size:.8rem;
padding:8px;
margin-bottom:10px;
}

.history::-webkit-scrollbar{
width:4px;
}

/* Grid */

.buttons{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
margin-top:15px;
}

/* Buttons */

button{
height:65px;
border:none;
border-radius:18px;
font-size:1.1rem;
font-weight:600;
cursor:pointer;
color:white;

background:
linear-gradient(
145deg,
#243447,
#182331
);

box-shadow:
8px 8px 18px rgba(0,0,0,.45),
-4px -4px 12px rgba(255,255,255,.03);

transition:.2s;
}

button:hover{
transform:translateY(-3px);
}

button:active{
transform:scale(.93);
}

.operator{
background:
linear-gradient(
145deg,
#ff9800,
#ff6f00
);
}

.equal{
background:
linear-gradient(
145deg,
#00d26a,
#00a651
);
}

.clear{
background:
linear-gradient(
145deg,
#ff4d6d,
#e63946
);
}

.scientific{
background:
linear-gradient(
145deg,
#7c3aed,
#5b21b6
);
}

.zero{
grid-column:span 2;
}

.title{
color:white;
font-size:1.2rem;
font-weight:600;
margin-bottom:15px;
text-align:center;
}

@media(max-width:500px){

.calculator{
width:95%;
}

button{
height:60px;
}

.display{
font-size:2rem;
}

}

</style>
</head>
<body>

<div class="calculator">

<div class="title">
🧮 Premium Calculator Pro
</div>

<div class="history" id="history"></div>

<input
type="text"
id="display"
class="display"
readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">AC</button>
<button class="clear" onclick="backspace()">⌫</button>
<button class="operator" onclick="append('%')">%</button>
<button class="operator" onclick="append('/')">÷</button>
<button class="scientific" onclick="append('Math.PI')">π</button>

<button class="scientific" onclick="append('Math.sin(')">sin</button>
<button class="scientific" onclick="append('Math.cos(')">cos</button>
<button class="scientific" onclick="append('Math.tan(')">tan</button>
<button class="operator" onclick="append('*')">×</button>
<button class="scientific" onclick="append('Math.sqrt(')">√</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="operator" onclick="append('-')">−</button>
<button class="scientific" onclick="append('**2')">x²</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="operator" onclick="append('+')">+</button>
<button class="scientific" onclick="append('**3')">x³</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="equal" onclick="calculate()">=</button>
<button class="scientific" onclick="append('(')">(</button>

<button class="zero" onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button class="scientific" onclick="append(')')">)</button>

</div>

</div>

<script>

const display =
document.getElementById("display");

const history =
document.getElementById("history");

function append(value){
display.value += value;
}

function clearDisplay(){
display.value = "";
}

function backspace(){
display.value =
display.value.slice(0,-1);
}

function calculate(){

try{

let expression =
display.value;

let result =
eval(expression);

history.innerHTML +=
`${expression} = ${result}<br>`;

history.scrollTop =
history.scrollHeight;

display.value =
result;

}

catch{

display.value =
"Error";

}

}

/* Keyboard Support */

document.addEventListener(
"keydown",
e=>{

if(
"0123456789+-*/.%()"
.includes(e.key)
){
display.value += e.key;
}

if(e.key==="Enter"){
calculate();
}

if(e.key==="Backspace"){
backspace();
}

if(e.key==="Escape"){
clearDisplay();
}

});

</script>

</body>
</html>
